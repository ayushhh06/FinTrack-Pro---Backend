spring.application.name=expense-api

# 1. Dynamic Database Connection (Uses Render env vars in production, falls back to localhost for local dev)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/expense_tracker_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate Architecture Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# 3. System Query Visibility
spring.jpa.show-sql=true

# 4. Dynamic Port Binding (Crucial for Render to detect your open port, defaults to 8080 locally)
server.port=${PORT:8080}
